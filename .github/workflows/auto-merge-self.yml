name: Auto-Merge (self)

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

# Dual-role caller: oitray/templates hosts the reusable workflow at
# .github/workflows/auto-merge.yml AND needs its own PRs to auto-merge.
# A second file with a distinct name avoids the filename collision —
# this file is a caller, auto-merge.yml is the reusable.
jobs:
  auto-merge:
    uses: ./.github/workflows/auto-merge.yml
    secrets:
      merge_token: ${{ secrets.PROJECT_TOKEN }}
