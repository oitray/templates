name: Auto-Merge (reusable)

on:
  workflow_call:
    inputs:
      merge_method:
        type: string
        default: squash
    secrets:
      merge_token:
        required: true

permissions:
  contents: write
  pull-requests: write

jobs:
  enable-auto-merge:
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false
    steps:
      - env:
          GH_TOKEN: ${{ secrets.merge_token }}
          PR_URL: ${{ github.event.pull_request.html_url }}
          METHOD: ${{ inputs.merge_method }}
        run: gh pr merge "$PR_URL" --auto --"$METHOD"
